<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graviton - Particle Gravity Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
    }

    .ui-layer {
      position: absolute;
      z-index: 10;
      pointer-events: none;
    }

    .title-card {
      top: 30px;
      left: 40px;
    }

    .title-card h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: #D4A853;
      text-shadow: 0 0 30px rgba(212, 168, 83, 0.5);
      letter-spacing: 4px;
    }

    .title-card p {
      font-size: 1rem;
      color: #888;
      letter-spacing: 2px;
      margin-top: 5px;
      text-transform: uppercase;
    }

    .stats-panel {
      top: 30px;
      right: 40px;
      text-align: right;
    }

    .stat {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      color: #00ff88;
      margin-bottom: 8px;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    }

    .stat span {
      color: #D4A853;
      font-weight: 700;
    }

    .controls-panel {
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      pointer-events: all;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 95vw;
    }

    .btn {
      background: rgba(212, 168, 83, 0.1);
      border: 1px solid #D4A853;
      color: #D4A853;
      padding: 10px 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .btn:hover {
      background: rgba(212, 168, 83, 0.25);
      box-shadow: 0 0 20px rgba(212, 168, 83, 0.3);
    }

    .btn.active {
      background: #D4A853;
      color: #0a0a0a;
    }

    .btn.singularity.active {
      background: linear-gradient(135deg, #D4A853, #ff6b6b);
      border-color: #ff6b6b;
    }

    .btn.galaxy.active {
      background: linear-gradient(135deg, #4ecdc4, #a855f7);
      border-color: #a855f7;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: all;
    }

    .slider-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      color: #00ff88;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .btn.lines {
      border-color: #4ecdc4;
      color: #4ecdc4;
    }
    .btn.lines:hover {
      background: rgba(78, 205, 196, 0.25);
      box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
    }
    .btn.lines.active {
      background: #4ecdc4;
      color: #0a0a0a;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 80px;
      height: 4px;
      background: rgba(212, 168, 83, 0.3);
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #D4A853;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(212, 168, 83, 0.5);
    }

    .mode-indicator {
      bottom: 40px;
      right: 40px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 2px;
    }

    .mode-indicator span {
      color: #00ff88;
      text-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
    }

    .shortcuts-hint {
      top: 100px;
      left: 40px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 1px;
      line-height: 1.8;
    }

    .shortcuts-hint kbd {
      color: #00ff88;
      background: rgba(0,255,136,0.1);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid rgba(0,255,136,0.3);
    }

    .breath-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(ellipse at center, rgba(212,168,83,0.02) 0%, transparent 70%);
      animation: breathe 8s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    .scanlines {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.03) 0px,
        rgba(0, 0, 0, 0.03) 1px,
        transparent 1px,
        transparent 2px
      );
    }
  </style>
</head>
<body>
  <div class="breath-bg"></div>
  <div class="scanlines"></div>
  <canvas id="canvas"></canvas>

  <div class="ui-layer title-card">
    <h1>GRAVITON</h1>
    <p>Particle Gravity Laboratory</p>
  </div>

  <div class="ui-layer shortcuts-hint">
    <kbd>1</kbd> ATTRACT &nbsp;<kbd>2</kbd> REPEL &nbsp;<kbd>3</kbd> VORTEX<br>
    <kbd>4</kbd> WAVE &nbsp;<kbd>5</kbd> CHAOS &nbsp;<kbd>6</kbd> SINGULARITY<br>
    <kbd>7</kbd> COLLIDE &nbsp;<kbd>8</kbd> GALAXY &nbsp;<kbd>L</kbd> LINES &nbsp;<kbd>E</kbd> BURST
  </div>

  <div class="ui-layer stats-panel">
    <div class="stat">PARTICLES <span id="particleCount">0</span></div>
    <div class="stat">GRAVITY <span id="gravityVal">1.0</span></div>
    <div class="stat">MODE <span id="modeLabel">ATTRACT</span></div>
    <div class="stat">VEL <span id="velLabel">-</span></div>
  </div>

  <div class="ui-layer controls-panel">
    <button class="btn active" id="btnAttract">ATTRACT</button>
    <button class="btn" id="btnRepel">REPEL</button>
    <button class="btn" id="btnVortex">VORTEX</button>
    <button class="btn" id="btnWave">WAVE</button>
    <button class="btn" id="btnChaos">CHAOS</button>
    <button class="btn singularity" id="btnSingularity">SINGULARITY</button>
    <button class="btn" id="btnCollide">COLLIDE</button>
    <button class="btn galaxy" id="btnGalaxy">GALAXY</button>
    <div class="slider-group">
      <span class="slider-label">GRAV</span>
      <input type="range" id="gravSlider" min="1" max="30" value="15">
    </div>
    <div class="slider-group">
      <span class="slider-label">TRAIL</span>
      <input type="range" id="trailSlider" min="1" max="20" value="15">
    </div>
    <div class="slider-group">
      <span class="slider-label">GLOW</span>
      <input type="range" id="glowSlider" min="5" max="30" value="15">
    </div>
    <button class="btn lines active" id="btnLines">LINES</button>
    <button class="btn" id="btnReset">RESET</button>
  </div>

  <div class="ui-layer mode-indicator">
    INTERACTIVE - CLICK TO SPAWN &nbsp;|&nbsp; DRAG TO INFLUENCE &nbsp;|&nbsp; <kbd>E</kbd> STARBURST
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let W, H;
    let particles = [];
    let mouseX = 0, mouseY = 0;
    let mouseRadius = 180;
    let gravity = 0.15;
    let mode = 'attract';
    let time = 0;
    let trailFade = 0.15;
    let glowSize = 15;
    let showLines = true;

    // Galaxy state
    let galaxyArms = 3;
    let galaxySpin = 1;
    let galaxyBurstTimer = 0;

    const colors = ['#D4A853', '#00ff88', '#ff6b6b', '#4ecdc4', '#a855f7', '#fbbf24', '#34d399'];

    // Velocity color: slow = gold, fast = neon green, very fast = red
    function velColor(speed) {
      const t = Math.min(speed / 8, 1);
      if (t < 0.5) {
        const r = Math.round(212 + (0 - 212) * (t * 2));
        const g = Math.round(168 + (255 - 168) * (t * 2));
        const b = Math.round(83 + (136 - 83) * (t * 2));
        return `rgb(${r},${g},${b})`;
      } else {
        const tt = (t - 0.5) * 2;
        const r = Math.round(0 + (255 - 0) * tt);
        const g = Math.round(255 + (80 - 255) * tt);
        const b = Math.round(136 + (80 - 136) * tt);
        return `rgb(${r},${g},${b})`;
      }
    }

    // Galaxy star colors: young blue-white in arms → old gold/red in bulge
    function galaxyColor(dist, armAngle, galaxyCX, galaxyCY) {
      const armFactor = Math.pow(Math.max(0, Math.cos(armAngle)), 4); // brightest near arm center
      const ageFactor = Math.min(dist / 400, 1); // older farther out

      if (armFactor > 0.5) {
        // Young hot stars in spiral arms - blue-white
        const t = Math.random();
        if (t < 0.4) return '#4ecdc4'; // cyan
        if (t < 0.7) return '#a855f7'; // purple
        return '#ffffff'; // white
      } else if (ageFactor < 0.3) {
        // Bulge - old warm stars
        const t = ageFactor / 0.3;
        const r = Math.round(255 - (255 - 212) * t);
        const g = Math.round(200 - (200 - 168) * t);
        const b = Math.round(150 - (150 - 83) * t);
        return `rgb(${r},${g},${b})`;
      } else {
        // Halo - scattered old red/brown
        if (Math.random() < 0.7) return '#fbbf24';
        return '#D4A853';
      }
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
      constructor(x, y, vx = null, vy = null) {
        this.x = x || Math.random() * W;
        this.y = y || Math.random() * H;
        this.vx = vx !== null ? vx : (Math.random() - 0.5) * 2;
        this.vy = vy !== null ? vy : (Math.random() - 0.5) * 2;
        this.radius = Math.random() * 3 + 1.5;
        this.baseRadius = this.radius;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.baseColor = this.color;
        this.alpha = Math.random() * 0.5 + 0.5;
        this.life = 1;
        this.decay = Math.random() * 0.003 + 0.001;
        this.pulseOffset = Math.random() * Math.PI * 2;
        this.trail = [];
        this.maxTrail = 12;
        // Galaxy-specific
        this.arm = Math.floor(Math.random() * galaxyArms);
        this.spiralOffset = (Math.random() - 0.5) * 1.2; // spread within arm
        this.dustSize = Math.random() * 0.5 + 0.3; // dust opacity
      }

      update() {
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (this.trail.length >= this.maxTrail) this.trail.shift();
        this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });

        if (mode === 'galaxy') {
          const gcx = mouseX || W / 2;
          const gcy = mouseY || H / 2;
          const gdx = gcx - this.x;
          const gdy = gcy - this.y;
          const gdist = Math.sqrt(gdx * gdx + gdy * gdy) || 1;

          if (gdist > 5) {
            // Orbital mechanics: v = sqrt(GM/r) for circular orbit
            // Tweak: use visual orbital speed
            const orbitalSpeed = Math.sqrt(80 / Math.max(gdist, 20)) * gravity * 15;
            // Tangential velocity (perpendicular to radius)
            const tx = -gdy / gdist;
            const ty = gdx / gdist;

            // Apply orbital velocity
            this.vx = tx * orbitalSpeed * galaxySpin;
            this.vy = ty * orbitalSpeed * galaxySpin;

            // Slight inward pull to keep in orbit
            this.vx -= (gdx / gdist) * orbitalSpeed * 0.08;
            this.vy -= (gdy / gdist) * orbitalSpeed * 0.08;
          }

          // Update position
          this.x += this.vx;
          this.y += this.vy;

          // Color based on distance from center
          const newDist = Math.sqrt((this.x - gcx) ** 2 + (this.y - gcy) ** 2);
          const angle = Math.atan2(this.y - gcy, this.x - gcx);
          const armAngle = angle - this.spiralOffset - time * galaxySpin * 0.3;
          this.color = galaxyColor(newDist, armAngle, gcx, gcy);

          // Glow more near center
          this.radius = this.baseRadius * (1 + Math.max(0, 1 - newDist / 300) * 0.8);

          // Fade near center
          this.alpha = Math.min(1, gdist / 200) * (Math.random() * 0.2 + 0.7);

        } else if (dist < mouseRadius && dist > 0) {
          const force = (mouseRadius - dist) / mouseRadius;
          const nx = dx / dist;
          const ny = dy / dist;

          if (mode === 'attract') {
            this.vx += nx * gravity * force;
            this.vy += ny * gravity * force;
          } else if (mode === 'repel') {
            this.vx -= nx * gravity * force * 2;
            this.vy -= ny * gravity * force * 2;
          } else if (mode === 'vortex') {
            const perpX = -ny;
            const perpY = nx;
            this.vx += perpX * gravity * force * 1.5;
            this.vy += perpY * gravity * force * 1.5;
            this.vx += nx * gravity * force * 0.3;
            this.vy += ny * gravity * force * 0.3;
          } else if (mode === 'wave') {
            const waveFreq = 0.03;
            const waveAmp = gravity * force * 2;
            this.vx += Math.sin(this.y * waveFreq + time * 3 + this.pulseOffset) * waveAmp;
            this.vy += Math.cos(this.x * waveFreq + time * 3 + this.pulseOffset) * waveAmp;
            this.vx += nx * gravity * force * 0.2;
            this.vy += ny * gravity * force * 0.2;
          } else if (mode === 'chaos') {
            this.vx += (Math.random() - 0.5) * gravity * force * 3;
            this.vy += (Math.random() - 0.5) * gravity * force * 3;
          } else if (mode === 'singularity') {
            const wellForce = (gravity * 3) / Math.max(dist / 80, 0.3);
            this.vx -= nx * wellForce * force;
            this.vy -= ny * wellForce * force;
            const perpX = -ny;
            const perpY = nx;
            this.vx += perpX * wellForce * 0.4;
            this.vy += perpY * wellForce * 0.4;
          } else if (mode === 'collide') {
            this.vx += nx * gravity * force * 1.2;
            this.vy += ny * gravity * force * 1.2;
          }
        } else if (mode === 'singularity' && dist > 0) {
          const wellForce = (gravity * 2) / Math.max(dist / 200, 0.5);
          this.vx -= dx / dist * wellForce * 0.3;
          this.vy -= dy / dist * wellForce * 0.3;
          const perpX = -dy / dist;
          const perpY = dx / dist;
          this.vx += perpX * wellForce * 0.15;
          this.vy += perpY * wellForce * 0.15;
        }

        // Gentle global pull toward center (non-galaxy modes)
        if (mode !== 'galaxy') {
          const cdx = W/2 - this.x;
          const cdy = H/2 - this.y;
          this.vx += cdx * 0.00005;
          this.vy += cdy * 0.00005;
        }

        // Damping
        const damping = mode === 'singularity' ? 0.995 : (mode === 'collide' ? 0.999 : 0.98);
        if (mode === 'galaxy') {
          // Very slight damping in galaxy mode for stable orbits
          this.vx *= 0.999;
          this.vy *= 0.999;
        } else {
          this.vx *= damping;
          this.vy *= damping;
        }

        if (mode !== 'galaxy') {
          this.x += this.vx;
          this.y += this.vy;
        }

        // Edge wrapping (disabled in singularity and galaxy)
        if (mode === 'collide') {
          if (this.x < this.radius) { this.x = this.radius; this.vx *= -0.8; }
          if (this.x > W - this.radius) { this.x = W - this.radius; this.vx *= -0.8; }
          if (this.y < this.radius) { this.y = this.radius; this.vy *= -0.8; }
          if (this.y > H - this.radius) { this.y = H - this.radius; this.vy *= -0.8; }
        } else if (mode !== 'singularity' && mode !== 'galaxy') {
          if (this.x < 0) this.x = W;
          if (this.x > W) this.x = 0;
          if (this.y < 0) this.y = H;
          if (this.y > H) this.y = 0;
        }

        // Speed-based color in singularity mode
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (mode === 'singularity') {
          this.color = velColor(speed);
          if (dist < 100) {
            this.radius = this.baseRadius * (1 + (1 - dist / 100) * 1.5);
          } else {
            this.radius = this.baseRadius;
          }
        } else if (mode !== 'galaxy') {
          this.color = this.baseColor;
          const pulse = Math.sin(time * 2 + this.pulseOffset) * 0.3;
          this.radius = this.baseRadius * (1 + pulse * 0.3);
        }

        this.alpha *= (1 - trailFade * 0.01);
      }

      drawTrail() {
        if (this.trail.length < 2 || mode !== 'singularity') return;
        ctx.save();
        for (let i = 0; i < this.trail.length - 1; i++) {
          const t = this.trail[i];
          const alpha = (i / this.trail.length) * 0.3 * this.alpha;
          ctx.strokeStyle = this.color;
          ctx.globalAlpha = alpha;
          ctx.lineWidth = this.radius * (i / this.trail.length) * 0.8;
          ctx.beginPath();
          ctx.moveTo(t.x, t.y);
          ctx.lineTo(this.trail[i + 1].x, this.trail[i + 1].y);
          ctx.stroke();
        }
        ctx.restore();
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = glowSize;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }

      drawGalaxy() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = glowSize * 1.5;
        ctx.shadowColor = this.color;
        ctx.fill();

        // Extra glow for bright young stars
        if (this.color === '#ffffff' || this.color === '#4ecdc4') {
          ctx.globalAlpha = this.alpha * 0.3;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
        }
        ctx.restore();
      }
    }

    // Draw singularity center
    function drawSingularityCenter() {
      if (mode !== 'singularity') return;
      const cx = mouseX || W / 2;
      const cy = mouseY || H / 2;
      const pulse = Math.sin(time * 4) * 0.2 + 1;
      const r = 8 * pulse;

      for (let i = 5; i >= 1; i--) {
        const ringR = r + i * 12;
        const alpha = 0.05 / i;
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 80, 60, ${alpha})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2);
      grad.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
      grad.addColorStop(0.3, 'rgba(255, 107, 107, 0.8)');
      grad.addColorStop(0.7, 'rgba(212, 168, 83, 0.4)');
      grad.addColorStop(1, 'rgba(212, 168, 83, 0)');

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r * 2, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#ff6b6b';
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = '#000';
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(time * 0.5);
      for (let i = 0; i < 3; i++) {
        const angle = (i / 3) * Math.PI * 2;
        const arcR = 30 + i * 15;
        ctx.beginPath();
        ctx.arc(0, 0, arcR, angle, angle + Math.PI * 0.8);
        ctx.strokeStyle = `rgba(255, 107, 107, ${0.15 - i * 0.03})`;
        ctx.lineWidth = 2 - i * 0.4;
        ctx.stroke();
      }
      ctx.restore();
    }

    // Draw galaxy center - glowing bulge + dust
    function drawGalaxyCenter() {
      if (mode !== 'galaxy') return;
      const cx = mouseX || W / 2;
      const cy = mouseY || H / 2;

      // Outer dust halo
      for (let i = 4; i >= 1; i--) {
        const ringR = 20 + i * 30;
        const alpha = 0.02 / i;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, ringR);
        grad.addColorStop(0, `rgba(212, 168, 83, ${alpha})`);
        grad.addColorStop(1, 'rgba(212, 168, 83, 0)');
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();
      }

      // Glowing core
      const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
      coreGrad.addColorStop(0, 'rgba(255, 255, 255, 0.6)');
      coreGrad.addColorStop(0.2, 'rgba(212, 168, 83, 0.4)');
      coreGrad.addColorStop(0.5, 'rgba(168, 100, 50, 0.2)');
      coreGrad.addColorStop(1, 'rgba(100, 60, 30, 0)');

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, 40, 0, Math.PI * 2);
      ctx.fillStyle = coreGrad;
      ctx.shadowBlur = 60;
      ctx.shadowColor = '#D4A853';
      ctx.fill();
      ctx.restore();

      // Spiral arm guide rings
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(time * galaxySpin * 0.2);
      for (let arm = 0; arm < galaxyArms; arm++) {
        const baseAngle = (arm / galaxyArms) * Math.PI * 2;
        for (let r = 60; r < 350; r += 40) {
          const spiralAngle = baseAngle + Math.log(r / 60) * 1.5 - time * galaxySpin * 0.15;
          const px = Math.cos(spiralAngle) * r;
          const py = Math.sin(spiralAngle) * r;
          const ringAlpha = 0.03 * (1 - r / 350);
          ctx.beginPath();
          ctx.arc(px, py, 15 + r * 0.05, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(78, 205, 196, ${ringAlpha})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    // Background stars for galaxy mode
    let bgStars = null;
    function initBgStars() {
      bgStars = [];
      for (let i = 0; i < 200; i++) {
        bgStars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.2 + 0.3,
          alpha: Math.random() * 0.4 + 0.1,
          twinkle: Math.random() * Math.PI * 2
        });
      }
    }
    initBgStars();

    function drawBgStars() {
      if (!bgStars) return;
      bgStars.forEach(s => {
        const twinkle = Math.sin(time * 2 + s.twinkle) * 0.1 + s.alpha;
        ctx.save();
        ctx.globalAlpha = twinkle;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.restore();
      });
    }

    // Initialize particles
    for (let i = 0; i < 400; i++) {
      particles.push(new Particle());
    }

    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    canvas.addEventListener('click', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      const spawnCount = mode === 'galaxy' ? 20 : 15;
      const burstSpeed = mode === 'galaxy' ? 3 : 5;
      for (let i = 0; i < spawnCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * burstSpeed + 2;
        const p = new Particle(mouseX, mouseY, Math.cos(angle) * speed, Math.sin(angle) * speed);
        p.alpha = 1;
        particles.push(p);
      }
    });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }, { passive: false });

    canvas.addEventListener('touchstart', (e) => {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
      for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 2;
        const p = new Particle(mouseX, mouseY, Math.cos(angle) * speed, Math.sin(angle) * speed);
        p.alpha = 1;
        particles.push(p);
      }
    });

    function setMode(newMode) {
      mode = newMode;
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      const modeNames = { attract: 'Attract', repel: 'Repel', vortex: 'Vortex', wave: 'Wave', chaos: 'Chaos', singularity: 'Singularity', collide: 'Collide', galaxy: 'Galaxy' };
      const btnId = 'btn' + modeNames[newMode];
      const btn = document.getElementById(btnId);
      if (btn) btn.classList.add('active');
      document.getElementById('modeLabel').textContent = newMode.toUpperCase();
    }

    // Button events
    document.getElementById('btnAttract').addEventListener('click', () => setMode('attract'));
    document.getElementById('btnRepel').addEventListener('click', () => setMode('repel'));
    document.getElementById('btnVortex').addEventListener('click', () => setMode('vortex'));
    document.getElementById('btnWave').addEventListener('click', () => setMode('wave'));
    document.getElementById('btnChaos').addEventListener('click', () => setMode('chaos'));
    document.getElementById('btnSingularity').addEventListener('click', () => setMode('singularity'));
    document.getElementById('btnCollide').addEventListener('click', () => setMode('collide'));
    document.getElementById('btnGalaxy').addEventListener('click', () => setMode('galaxy'));
    document.getElementById('btnReset').addEventListener('click', () => {
      particles = [];
      for (let i = 0; i < 400; i++) {
        particles.push(new Particle());
      }
    });

    // Sliders
    document.getElementById('gravSlider').addEventListener('input', (e) => {
      gravity = parseInt(e.target.value) / 100;
      document.getElementById('gravityVal').textContent = gravity.toFixed(2);
    });

    document.getElementById('trailSlider').addEventListener('input', (e) => {
      trailFade = parseInt(e.target.value);
    });

    document.getElementById('glowSlider').addEventListener('input', (e) => {
      glowSize = parseInt(e.target.value);
    });

    document.getElementById('btnLines').addEventListener('click', () => {
      showLines = !showLines;
      const btn = document.getElementById('btnLines');
      if (showLines) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });

    // Galaxy burst effect
    function triggerGalaxyBurst() {
      const cx = mouseX || W / 2;
      const cy = mouseY || H / 2;
      for (let i = 0; i < 80; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 3;
        const p = new Particle(cx, cy, Math.cos(angle) * speed, Math.sin(angle) * speed);
        p.alpha = 1;
        p.radius = Math.random() * 4 + 2;
        p.baseRadius = p.radius;
        // Burst particles get random galaxy colors
        const colorRoll = Math.random();
        if (colorRoll < 0.3) p.color = '#4ecdc4';
        else if (colorRoll < 0.6) p.color = '#a855f7';
        else if (colorRoll < 0.8) p.color = '#ffffff';
        else p.color = '#D4A853';
        p.baseColor = p.color;
        particles.push(p);
      }
      galaxyBurstTimer = 0.5; // seconds of burst effect
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === '1') setMode('attract');
      else if (key === '2') setMode('repel');
      else if (key === '3') setMode('vortex');
      else if (key === '4') setMode('wave');
      else if (key === '5') setMode('chaos');
      else if (key === '6') setMode('singularity');
      else if (key === '7') setMode('collide');
      else if (key === '8') setMode('galaxy');
      else if (key === 'l') {
        showLines = !showLines;
        const btn = document.getElementById('btnLines');
        if (showLines) btn.classList.add('active');
        else btn.classList.remove('active');
      }
      else if (key === 'r') {
        particles = [];
        for (let i = 0; i < 400; i++) {
          particles.push(new Particle());
        }
      }
      else if (key === 'p') {
        for (let i = 0; i < 50; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 4 + 1;
          const p = new Particle(mouseX || W/2, mouseY || H/2, Math.cos(angle) * speed, Math.sin(angle) * speed);
          p.alpha = 1;
          particles.push(p);
        }
      }
      else if (key === 'e' && mode === 'galaxy') {
        triggerGalaxyBurst();
      }
    });

    function drawConnectionLines() {
      if (!showLines || mode === 'singularity' || mode === 'galaxy') return;
      const maxDist = 80 + glowSize;
      ctx.save();
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < maxDist) {
            const alpha = (1 - dist / maxDist) * 0.12;
            ctx.strokeStyle = `rgba(212, 168, 83, ${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      ctx.restore();
    }

    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = 'rgba(212, 168, 83, 0.03)';
      ctx.lineWidth = 1;
      const gridSize = 60;
      for (let x = 0; x < W; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function animate() {
      // Trail effect with variable fade
      const fadeAlpha = mode === 'galaxy' ? 0.08 : (0.1 + trailFade * 0.005);
      ctx.fillStyle = `rgba(10, 10, 10, ${fadeAlpha})`;
      ctx.fillRect(0, 0, W, H);

      if (mode === 'galaxy') {
        drawBgStars();
        drawGalaxyCenter();
      } else {
        drawGrid();
        drawConnectionLines();
        drawSingularityCenter();
      }

      // Draw particles
      particles.forEach(p => {
        p.update();
        if (mode === 'galaxy') {
          p.drawTrail(); // minimal trail in galaxy mode
          p.drawGalaxy();
        } else {
          p.drawTrail();
          p.draw();
        }
      });

      // Galaxy burst shockwave ring
      if (galaxyBurstTimer > 0) {
        const cx = mouseX || W / 2;
        const cy = mouseY || H / 2;
        const burstRadius = (0.5 - galaxyBurstTimer) * 800;
        const burstAlpha = galaxyBurstTimer * 0.4;
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, burstRadius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(78, 205, 196, ${burstAlpha})`;
        ctx.lineWidth = 3;
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#4ecdc4';
        ctx.stroke();
        ctx.restore();
        galaxyBurstTimer -= 0.016;
      }

      // Remove dead particles
      particles = particles.filter(p => p.alpha > 0.05);

      // Collision step for collide mode
      if (mode === 'collide') {
        const restitution = 0.85;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[j].x - particles[i].x;
            const dy = particles[j].y - particles[i].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const minDist = particles[i].radius + particles[j].radius;
            if (dist < minDist && dist > 0) {
              const overlap = (minDist - dist) / 2;
              const nx2 = dx / dist;
              const ny2 = dy / dist;
              particles[i].x -= nx2 * overlap;
              particles[i].y -= ny2 * overlap;
              particles[j].x += nx2 * overlap;
              particles[j].y += ny2 * overlap;
              const dvx = particles[i].vx - particles[j].vx;
              const dvy = particles[i].vy - particles[j].vy;
              const dvn = dvx * nx2 + dvy * ny2;
              if (dvn > 0) {
                particles[i].vx -= dvn * nx2 * restitution;
                particles[i].vy -= dvn * ny2 * restitution;
                particles[j].vx += dvn * nx2 * restitution;
                particles[j].vy += dvn * ny2 * restitution;
              }
            }
          }
        }
      }

      // Maintain minimum count
      while (particles.length < 300) {
        particles.push(new Particle());
      }

      // Update stats
      document.getElementById('particleCount').textContent = particles.length;
      if ((mode === 'singularity' || mode === 'galaxy') && particles.length > 0) {
        const avgVel = particles.reduce((s, p) => s + Math.sqrt(p.vx * p.vx + p.vy * p.vy), 0) / particles.length;
        document.getElementById('velLabel').textContent = avgVel.toFixed(1);
      } else {
        document.getElementById('velLabel').textContent = '-';
      }

      time += 0.016;
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
