<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graviton — Particle Gravity Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
    }

    .ui-layer {
      position: absolute;
      z-index: 10;
      pointer-events: none;
    }

    .title-card {
      top: 30px;
      left: 40px;
    }

    .title-card h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: #D4A853;
      text-shadow: 0 0 30px rgba(212, 168, 83, 0.5);
      letter-spacing: 4px;
    }

    .title-card p {
      font-size: 1rem;
      color: #888;
      letter-spacing: 2px;
      margin-top: 5px;
      text-transform: uppercase;
    }

    .stats-panel {
      top: 30px;
      right: 40px;
      text-align: right;
    }

    .stat {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      color: #00ff88;
      margin-bottom: 8px;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    }

    .stat span {
      color: #D4A853;
      font-weight: 700;
    }

    .controls-panel {
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      pointer-events: all;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 95vw;
    }

    .btn {
      background: rgba(212, 168, 83, 0.1);
      border: 1px solid #D4A853;
      color: #D4A853;
      padding: 10px 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .btn:hover {
      background: rgba(212, 168, 83, 0.25);
      box-shadow: 0 0 20px rgba(212, 168, 83, 0.3);
    }

    .btn.active {
      background: #D4A853;
      color: #0a0a0a;
    }

    .btn.singularity.active {
      background: linear-gradient(135deg, #D4A853, #ff6b6b);
      border-color: #ff6b6b;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: all;
    }

    .slider-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      color: #00ff88;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 80px;
      height: 4px;
      background: rgba(212, 168, 83, 0.3);
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #D4A853;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(212, 168, 83, 0.5);
    }

    .mode-indicator {
      bottom: 40px;
      right: 40px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 2px;
    }

    .mode-indicator span {
      color: #00ff88;
      text-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
    }

    .shortcuts-hint {
      top: 100px;
      left: 40px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 1px;
      line-height: 1.8;
    }

    .shortcuts-hint kbd {
      color: #00ff88;
      background: rgba(0,255,136,0.1);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid rgba(0,255,136,0.3);
    }

    .breath-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(ellipse at center, rgba(212,168,83,0.02) 0%, transparent 70%);
      animation: breathe 8s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    .scanlines {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.03) 0px,
        rgba(0, 0, 0, 0.03) 1px,
        transparent 1px,
        transparent 2px
      );
    }
  </style>
</head>
<body>
  <div class="breath-bg"></div>
  <div class="scanlines"></div>
  <canvas id="canvas"></canvas>

  <div class="ui-layer title-card">
    <h1>GRAVITON</h1>
    <p>Particle Gravity Laboratory</p>
  </div>

  <div class="ui-layer shortcuts-hint">
    <kbd>1</kbd> ATTRACT &nbsp;<kbd>2</kbd> REPEL &nbsp;<kbd>3</kbd> VORTEX<br>
    <kbd>4</kbd> WAVE &nbsp;<kbd>5</kbd> CHAOS &nbsp;<kbd>6</kbd> SINGULARITY<br>
    <kbd>R</kbd> RESET &nbsp;<kbd>P</kbd> +50 PART
  </div>

  <div class="ui-layer stats-panel">
    <div class="stat">PARTICLES <span id="particleCount">0</span></div>
    <div class="stat">GRAVITY <span id="gravityVal">1.0</span></div>
    <div class="stat">MODE <span id="modeLabel">ATTRACT</span></div>
    <div class="stat">VEL <span id="velLabel">—</span></div>
  </div>

  <div class="ui-layer controls-panel">
    <button class="btn active" id="btnAttract">ATTRACT</button>
    <button class="btn" id="btnRepel">REPEL</button>
    <button class="btn" id="btnVortex">VORTEX</button>
    <button class="btn" id="btnWave">WAVE</button>
    <button class="btn" id="btnChaos">CHAOS</button>
    <button class="btn singularity" id="btnSingularity">SINGULARITY</button>
    <div class="slider-group">
      <span class="slider-label">TRAIL</span>
      <input type="range" id="trailSlider" min="1" max="20" value="15">
    </div>
    <div class="slider-group">
      <span class="slider-label">GLOW</span>
      <input type="range" id="glowSlider" min="5" max="30" value="15">
    </div>
    <button class="btn" id="btnReset">RESET</button>
  </div>

  <div class="ui-layer mode-indicator">
    INTERACTIVE — CLICK TO SPAWN &nbsp;|&nbsp; DRAG TO INFLUENCE
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let W, H;
    let particles = [];
    let mouseX = 0, mouseY = 0;
    let mouseRadius = 180;
    let gravity = 0.15;
    let mode = 'attract';
    let time = 0;
    let trailFade = 0.15;
    let glowSize = 15;

    const colors = ['#D4A853', '#00ff88', '#ff6b6b', '#4ecdc4', '#a855f7', '#fbbf24', '#34d399'];

    // Velocity color: slow = gold, fast = neon green, very fast = red
    function velColor(speed) {
      const t = Math.min(speed / 8, 1);
      if (t < 0.5) {
        // gold to neon green
        const r = Math.round(212 + (0 - 212) * (t * 2));
        const g = Math.round(168 + (255 - 168) * (t * 2));
        const b = Math.round(83 + (136 - 83) * (t * 2));
        return `rgb(${r},${g},${b})`;
      } else {
        // neon green to red
        const tt = (t - 0.5) * 2;
        const r = Math.round(0 + (255 - 0) * tt);
        const g = Math.round(255 + (80 - 255) * tt);
        const b = Math.round(136 + (80 - 136) * tt);
        return `rgb(${r},${g},${b})`;
      }
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
      constructor(x, y, vx = null, vy = null) {
        this.x = x || Math.random() * W;
        this.y = y || Math.random() * H;
        this.vx = vx !== null ? vx : (Math.random() - 0.5) * 2;
        this.vy = vy !== null ? vy : (Math.random() - 0.5) * 2;
        this.radius = Math.random() * 3 + 1.5;
        this.baseRadius = this.radius;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.baseColor = this.color;
        this.alpha = Math.random() * 0.5 + 0.5;
        this.life = 1;
        this.decay = Math.random() * 0.003 + 0.001;
        this.pulseOffset = Math.random() * Math.PI * 2;
        this.trail = [];
        this.maxTrail = 12;
      }

      update() {
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // Store trail position
        if (this.trail.length >= this.maxTrail) this.trail.shift();
        this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });

        if (dist < mouseRadius && dist > 0) {
          const force = (mouseRadius - dist) / mouseRadius;
          const nx = dx / dist;
          const ny = dy / dist;

          if (mode === 'attract') {
            this.vx += nx * gravity * force;
            this.vy += ny * gravity * force;
          } else if (mode === 'repel') {
            this.vx -= nx * gravity * force * 2;
            this.vy -= ny * gravity * force * 2;
          } else if (mode === 'vortex') {
            const perpX = -ny;
            const perpY = nx;
            this.vx += perpX * gravity * force * 1.5;
            this.vy += perpY * gravity * force * 1.5;
            this.vx += nx * gravity * force * 0.3;
            this.vy += ny * gravity * force * 0.3;
          } else if (mode === 'wave') {
            const waveFreq = 0.03;
            const waveAmp = gravity * force * 2;
            this.vx += Math.sin(this.y * waveFreq + time * 3 + this.pulseOffset) * waveAmp;
            this.vy += Math.cos(this.x * waveFreq + time * 3 + this.pulseOffset) * waveAmp;
            this.vx += nx * gravity * force * 0.2;
            this.vy += ny * gravity * force * 0.2;
          } else if (mode === 'chaos') {
            this.vx += (Math.random() - 0.5) * gravity * force * 3;
            this.vy += (Math.random() - 0.5) * gravity * force * 3;
          } else if (mode === 'singularity') {
            // Deep gravity well — inverse square pull
            const wellForce = (gravity * 3) / Math.max(dist / 80, 0.3);
            this.vx -= nx * wellForce * force;
            this.vy -= ny * wellForce * force;
            // Tangential spin for accretion disk effect
            const perpX = -ny;
            const perpY = nx;
            this.vx += perpX * wellForce * 0.4;
            this.vy += perpY * wellForce * 0.4;
          }
        } else if (mode === 'singularity' && dist > 0) {
          // Global singularity pull from mouse even outside radius
          const wellForce = (gravity * 2) / Math.max(dist / 200, 0.5);
          this.vx -= dx / dist * wellForce * 0.3;
          this.vy -= dy / dist * wellForce * 0.3;
          const perpX = -dy / dist;
          const perpY = dx / dist;
          this.vx += perpX * wellForce * 0.15;
          this.vy += perpY * wellForce * 0.15;
        }

        // Gentle global pull toward center
        const cdx = W/2 - this.x;
        const cdy = H/2 - this.y;
        this.vx += cdx * 0.00005;
        this.vy += cdy * 0.00005;

        // Damping
        const damping = mode === 'singularity' ? 0.995 : 0.98;
        this.vx *= damping;
        this.vy *= damping;

        this.x += this.vx;
        this.y += this.vy;

        // Wrap edges (disabled in singularity — they fall into the well)
        if (mode !== 'singularity') {
          if (this.x < 0) this.x = W;
          if (this.x > W) this.x = 0;
          if (this.y < 0) this.y = H;
          if (this.y > H) this.y = 0;
        }

        // Speed-based color in singularity mode
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (mode === 'singularity') {
          this.color = velColor(speed);
          // Stretch particles near center
          if (dist < 100) {
            this.radius = this.baseRadius * (1 + (1 - dist / 100) * 1.5);
          } else {
            this.radius = this.baseRadius;
          }
        } else {
          this.color = this.baseColor;
          // Pulse radius
          const pulse = Math.sin(time * 2 + this.pulseOffset) * 0.3;
          this.radius = this.baseRadius * (1 + pulse * 0.3);
        }

        // Fade trail
        this.alpha *= (1 - trailFade * 0.01);
      }

      drawTrail() {
        if (this.trail.length < 2 || mode !== 'singularity') return;
        ctx.save();
        for (let i = 0; i < this.trail.length - 1; i++) {
          const t = this.trail[i];
          const alpha = (i / this.trail.length) * 0.3 * this.alpha;
          ctx.strokeStyle = this.color;
          ctx.globalAlpha = alpha;
          ctx.lineWidth = this.radius * (i / this.trail.length) * 0.8;
          ctx.beginPath();
          ctx.moveTo(t.x, t.y);
          ctx.lineTo(this.trail[i + 1].x, this.trail[i + 1].y);
          ctx.stroke();
        }
        ctx.restore();
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = glowSize;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    // Draw singularity center (accretion disk)
    function drawSingularityCenter() {
      if (mode !== 'singularity') return;
      const cx = mouseX || W / 2;
      const cy = mouseY || H / 2;
      const pulse = Math.sin(time * 4) * 0.2 + 1;
      const r = 8 * pulse;

      // Outer glow rings
      for (let i = 5; i >= 1; i--) {
        const ringR = r + i * 12;
        const alpha = 0.05 / i;
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 80, 60, ${alpha})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      // Core
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2);
      grad.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
      grad.addColorStop(0.3, 'rgba(255, 107, 107, 0.8)');
      grad.addColorStop(0.7, 'rgba(212, 168, 83, 0.4)');
      grad.addColorStop(1, 'rgba(212, 168, 83, 0)');

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r * 2, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#ff6b6b';
      ctx.fill();
      ctx.restore();

      // Event horizon — dark center
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = '#000';
      ctx.fill();
      ctx.restore();

      // Accretion disk arcs
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(time * 0.5);
      for (let i = 0; i < 3; i++) {
        const angle = (i / 3) * Math.PI * 2;
        const arcR = 30 + i * 15;
        ctx.beginPath();
        ctx.arc(0, 0, arcR, angle, angle + Math.PI * 0.8);
        ctx.strokeStyle = `rgba(255, 107, 107, ${0.15 - i * 0.03})`;
        ctx.lineWidth = 2 - i * 0.4;
        ctx.stroke();
      }
      ctx.restore();
    }

    // Initialize particles
    for (let i = 0; i < 400; i++) {
      particles.push(new Particle());
    }

    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    canvas.addEventListener('click', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        const p = new Particle(mouseX, mouseY, Math.cos(angle) * speed, Math.sin(angle) * speed);
        p.alpha = 1;
        particles.push(p);
      }
    });

    // Touch support
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }, { passive: false });

    canvas.addEventListener('touchstart', (e) => {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
      for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 2;
        const p = new Particle(mouseX, mouseY, Math.cos(angle) * speed, Math.sin(angle) * speed);
        p.alpha = 1;
        particles.push(p);
      }
    });

    function setMode(newMode) {
      mode = newMode;
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      const modeNames = { attract: 'Attract', repel: 'Repel', vortex: 'Vortex', wave: 'Wave', chaos: 'Chaos', singularity: 'Singularity' };
      const btnId = 'btn' + modeNames[newMode];
      const btn = document.getElementById(btnId);
      if (btn) btn.classList.add('active');
      document.getElementById('modeLabel').textContent = newMode.toUpperCase();
    }

    // Button events
    document.getElementById('btnAttract').addEventListener('click', () => setMode('attract'));
    document.getElementById('btnRepel').addEventListener('click', () => setMode('repel'));
    document.getElementById('btnVortex').addEventListener('click', () => setMode('vortex'));
    document.getElementById('btnWave').addEventListener('click', () => setMode('wave'));
    document.getElementById('btnChaos').addEventListener('click', () => setMode('chaos'));
    document.getElementById('btnSingularity').addEventListener('click', () => setMode('singularity'));
    document.getElementById('btnReset').addEventListener('click', () => {
      particles = [];
      for (let i = 0; i < 400; i++) {
        particles.push(new Particle());
      }
    });

    // Sliders
    document.getElementById('trailSlider').addEventListener('input', (e) => {
      trailFade = parseInt(e.target.value);
    });

    document.getElementById('glowSlider').addEventListener('input', (e) => {
      glowSize = parseInt(e.target.value);
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === '1') setMode('attract');
      else if (key === '2') setMode('repel');
      else if (key === '3') setMode('vortex');
      else if (key === '4') setMode('wave');
      else if (key === '5') setMode('chaos');
      else if (key === '6') setMode('singularity');
      else if (key === 'r') {
        particles = [];
        for (let i = 0; i < 400; i++) {
          particles.push(new Particle());
        }
      }
      else if (key === 'p') {
        // Add 50 particles at mouse
        for (let i = 0; i < 50; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 4 + 1;
          const p = new Particle(mouseX || W/2, mouseY || H/2, Math.cos(angle) * speed, Math.sin(angle) * speed);
          p.alpha = 1;
          particles.push(p);
        }
      }
    });

    function drawConnectionLines() {
      if (mode === 'singularity') return; // disabled for performance + aesthetics
      const maxDist = 80 + glowSize;
      ctx.save();
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < maxDist) {
            const alpha = (1 - dist / maxDist) * 0.12;
            ctx.strokeStyle = `rgba(212, 168, 83, ${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      ctx.restore();
    }

    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = 'rgba(212, 168, 83, 0.03)';
      ctx.lineWidth = 1;
      const gridSize = 60;
      for (let x = 0; x < W; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function animate() {
      // Trail effect with variable fade
      ctx.fillStyle = `rgba(10, 10, 10, ${0.1 + trailFade * 0.005})`;
      ctx.fillRect(0, 0, W, H);

      drawGrid();
      drawConnectionLines();

      // Draw singularity center first (behind particles)
      drawSingularityCenter();

      particles.forEach(p => {
        p.update();
        p.drawTrail();
        p.draw();
      });

      // Remove dead particles
      particles = particles.filter(p => p.alpha > 0.05);

      // Maintain minimum count
      while (particles.length < 300) {
        particles.push(new Particle());
      }

      // Update stats
      document.getElementById('particleCount').textContent = particles.length;
      if (mode === 'singularity' && particles.length > 0) {
        const avgVel = particles.reduce((s, p) => s + Math.sqrt(p.vx * p.vx + p.vy * p.vy), 0) / particles.length;
        document.getElementById('velLabel').textContent = avgVel.toFixed(1);
      } else {
        document.getElementById('velLabel').textContent = '—';
      }

      time += 0.016;
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
